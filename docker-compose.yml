version: "3.9"

networks:
  vpn_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  bot_logs:
    driver: local

services:

  postgres:
    image: postgres:16-alpine
    container_name: vpn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vpnplatform}
      POSTGRES_USER: ${POSTGRES_USER:-vpnuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vpn_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vpnuser} -d ${POSTGRES_DB:-vpnplatform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: vpn_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - vpn_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpn_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - bot_logs:/app/logs
    networks:
      - vpn_network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpn_migrate
    entrypoint: ["sh", "-c", "pip install --no-cache-dir -r requirements.txt && alembic upgrade head"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vpn_network
    restart: "no"
